<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <meta name="theme-color" content="#050505">
    <meta name="application-name" content="Scene Ink">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-title" content="Scene Ink">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="format-detection" content="telephone=no">
    <title>Scene Ink</title>
    <link rel="manifest" href="./manifest.webmanifest">
    <link rel="icon" type="image/svg+xml" href="./icons/scene-ink.svg">
    <link rel="apple-touch-icon" sizes="180x180" href="./icons/apple-touch-icon.png">
    <link rel="mask-icon" href="./icons/scene-ink-mask.svg" color="#14b8a6">
    <link rel="stylesheet" href="./styles.css">
  </head>
  <body>
    <main class="stage">
      <div class="viewport">
        <video id="camera" autoplay muted playsinline></video>
        <canvas id="paint"></canvas>
        <canvas id="freezeFrame" hidden></canvas>
      </div>

      <button id="saveButton" class="icon-button save-button" type="button" title="Save" aria-label="Save">
        <svg viewBox="0 0 24 24" aria-hidden="true">
          <path d="M14.5 4 13 6H8L6.5 4H4a2 2 0 0 0-2 2v12a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2V6a2 2 0 0 0-2-2z"></path>
          <circle cx="12" cy="13" r="4"></circle>
        </svg>
      </button>

      <div class="sample-toolbar" aria-label="Sampling">
        <input id="sampleWidthControl" type="range" min="8" max="160" value="48" step="1" title="Sampling width" aria-label="Sampling width">
      </div>

      <div class="toolbar" aria-label="Controls">
        <button id="cameraButton" class="icon-button" type="button" title="Start camera" aria-label="Start camera">◉</button>
        <button id="undoButton" class="icon-button" type="button" title="Undo" aria-label="Undo">
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <path d="M9 14 4 9l5-5"></path>
            <path d="M4 9h10a6 6 0 0 1 0 12h-2"></path>
          </svg>
        </button>
        <input id="widthControl" type="range" min="8" max="96" value="34" step="1" title="Brush width" aria-label="Brush width">
        <button id="clearButton" class="icon-button" type="button" title="Clear" aria-label="Clear">
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <path d="M3 6h18"></path>
            <path d="M8 6V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path>
            <path d="m19 6-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"></path>
            <path d="M10 11v6"></path>
            <path d="M14 11v6"></path>
          </svg>
        </button>
      </div>

      <output id="status" aria-live="polite"></output>
    </main>

    <script src="./app.js" type="module"></script>
  </body>
</html>
